version: 2

models:
  - name: dim_dates
    description: "Date dimension derived from ingestion timestamps"

    columns:

      - name: date_key
        description: "Unique date key in YYYYMMDD format"
        tests:
          - not_null
          - unique

      - name: full_date
        description: "Actual calendar date"
        tests:
          - not_null
          - unique

      - name: day
        description: "Day of month"
        tests:
          - not_null

      - name: month
        description: "Month of year"
        tests:
          - not_null

      - name: year
        description: "Year"
        tests:
          - not_null

      - name: day_of_week
        description: "Day of week (1=Sunday in BigQuery)"
        tests:
          - not_null